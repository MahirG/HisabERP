name: Global localization inventory

on:
  push:
    branches: [agent/global-i18n-enforcement]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  inventory:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci --ignore-scripts --no-audit --no-fund
      - run: node scripts/i18n-audit.mjs
      - uses: actions/upload-artifact@v4
        with:
          name: global-i18n-inventory
          path: i18n-audit-report.json
          retention-days: 3
