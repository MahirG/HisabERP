name: Dependency security review

on:
  push:
    branches: [agent/dependency-security-review]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Resolve dependency tree
        run: npm install --package-lock-only --ignore-scripts --no-fund
      - name: Commit lockfile on the review branch
        if: github.event_name == 'push'
        shell: bash
        run: |
          if git diff --quiet -- package-lock.json && git ls-files --error-unmatch package-lock.json >/dev/null 2>&1; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package-lock.json
          git commit -m "Lock audited dependency tree"
          git push origin HEAD:agent/dependency-security-review
      - name: Capture exact dependency tree
        run: npm ls --all --json > dependency-tree.json || true
      - name: Capture npm audit report
        run: npm audit --json > npm-audit.json || true
      - name: Upload dependency evidence
        uses: actions/upload-artifact@v4
        with:
          name: dependency-security-evidence
          path: |
            package-lock.json
            dependency-tree.json
            npm-audit.json
          retention-days: 3
