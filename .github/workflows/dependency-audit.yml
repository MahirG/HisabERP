name: Dependency security review

on:
  push:
    branches: [agent/dependency-security-review]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Resolve dependency tree
        run: npm install --package-lock-only --ignore-scripts --no-fund
      - name: Capture exact dependency tree
        run: npm ls --all --json > dependency-tree.json || true
      - name: Capture npm audit report
        run: npm audit --json > npm-audit.json || true
      - name: Upload dependency evidence
        uses: actions/upload-artifact@v4
        with:
          name: dependency-security-evidence
          path: |
            package-lock.json
            dependency-tree.json
            npm-audit.json
          retention-days: 3
