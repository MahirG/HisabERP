name: Capture PR83 production audit

on:
  push:
    branches:
      - agent/stripe-dahlia-release-hardening
    paths:
      - .github/workflows/capture-pr83-audit.yml

permissions:
  contents: write

jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/stripe-dahlia-release-hardening
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --ignore-scripts --no-audit --no-fund
      - name: Capture sanitized production audit
        run: |
          npm audit --omit=dev --json > /tmp/audit.json || true
          node - <<'NODE'
          const fs = require('node:fs');
          const audit = JSON.parse(fs.readFileSync('/tmp/audit.json', 'utf8'));
          const vulnerabilities = Object.fromEntries(Object.entries(audit.vulnerabilities || {}).map(([name, value]) => [name, {
            severity: value.severity,
            isDirect: value.isDirect,
            range: value.range,
            via: (value.via || []).map((item) => typeof item === 'string' ? item : {
              title: item.title,
              url: item.url,
              severity: item.severity,
              range: item.range
            }),
            fixAvailable: value.fixAvailable
          }]));
          fs.writeFileSync('audit-pr83.json', JSON.stringify({ vulnerabilities, metadata: audit.metadata?.vulnerabilities || {} }, null, 2) + '\n');
          NODE
      - name: Commit sanitized audit result
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add audit-pr83.json
          git commit -m "Capture PR83 dependency audit"
          git push origin HEAD:agent/stripe-dahlia-release-hardening
