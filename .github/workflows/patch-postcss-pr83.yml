name: Patch final PostCSS dependency

on:
  push:
    branches:
      - agent/final-stripe-main-cleanup
    paths:
      - .github/workflows/patch-postcss-pr83.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/final-stripe-main-cleanup
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Pin patched PostCSS and refresh lockfile
        run: |
          npm pkg set overrides.postcss=8.5.22
          npm install --package-lock-only --ignore-scripts --no-audit --no-fund
      - name: Verify production dependency audit
        run: npm audit --omit=dev --audit-level=moderate
      - name: Commit patched dependency metadata
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git commit -m "Patch PostCSS source map traversal advisory"
          git push origin HEAD:agent/final-stripe-main-cleanup
