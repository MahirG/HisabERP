name: Capture production audit

on:
  push:
    branches:
      - agent/complete-auth-stripe-commerce
    paths:
      - .github/workflows/capture-production-audit.yml

permissions:
  contents: write

jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/complete-auth-stripe-commerce
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --ignore-scripts
      - name: Capture audit details
        run: |
          npm audit --omit=dev --json > /tmp/audit.json || true
          node - <<'NODE'
          const fs = require('node:fs');
          const audit = JSON.parse(fs.readFileSync('/tmp/audit.json', 'utf8'));
          fs.writeFileSync('production-audit-summary.json', JSON.stringify({
            auditReportVersion: audit.auditReportVersion,
            vulnerabilities: audit.vulnerabilities,
            metadata: audit.metadata
          }, null, 2) + '\n');
          NODE
      - name: Commit audit summary
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add production-audit-summary.json
          git commit -m "Capture production dependency audit"
          git push origin HEAD:agent/complete-auth-stripe-commerce
