name: Refresh Next security lock

on:
  push:
    branches:
      - agent/complete-auth-stripe-commerce
    paths:
      - .github/workflows/refresh-next-security-lock.yml

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/complete-auth-stripe-commerce
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Refresh patched production dependencies
        shell: bash
        run: |
          set +e
          {
            echo "== npm version =="
            npm --version
            echo "== update package policy =="
            npm pkg delete overrides.next
            npm pkg set overrides.postcss=8.5.12 overrides.sharp=0.35.3
            echo "== refresh lockfile =="
            npm install --package-lock-only --ignore-scripts --save-exact next@16.2.11
            install_status=$?
            echo "install_status=$install_status"
            echo "== production audit =="
            npm audit --omit=dev --audit-level=moderate
            audit_status=$?
            echo "audit_status=$audit_status"
          } > security-refresh-result.txt 2>&1
          cat security-refresh-result.txt
          exit 0
      - name: Commit generated result
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json security-refresh-result.txt
          git commit -m "Refresh Next.js security dependencies"
          git push origin HEAD:agent/complete-auth-stripe-commerce
