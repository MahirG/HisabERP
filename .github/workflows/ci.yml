name: Hisab ERP CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install locked dependencies
        run: npm ci --no-audit --no-fund
      - name: Production dependency audit
        run: npm run audit:production
      - name: TypeScript
        id: typecheck
        run: npm run typecheck 2>&1 | tee typecheck.log
      - name: Upload TypeScript diagnostics
        if: failure() && steps.typecheck.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: typecheck-diagnostics
          path: typecheck.log
          retention-days: 3
      - name: Tests
        id: tests
        run: npm test 2>&1 | tee test.log
      - name: Upload test diagnostics
        if: failure() && steps.tests.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: test-diagnostics
          path: test.log
          retention-days: 3
      - name: Production build
        run: npm run build
