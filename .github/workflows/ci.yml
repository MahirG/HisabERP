name: Hisab ERP CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install --no-audit --no-fund
      - name: TypeScript
        id: typecheck
        shell: bash
        run: |
          set +e
          npm run typecheck 2>&1 | tee typecheck.log
          status=${PIPESTATUS[0]}
          exit $status
      - name: Upload TypeScript diagnostics
        if: failure() && steps.typecheck.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: typecheck-diagnostics
          path: typecheck.log
          retention-days: 3
      - run: npm test
      - run: npm run build
