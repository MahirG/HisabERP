name: Generate Speed Insights lockfile

on:
  push:
    branches:
      - perf/vercel-speed-insights

permissions:
  contents: write

jobs:
  lockfile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: perf/vercel-speed-insights
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Generate npm lockfile
        run: npm install --package-lock-only --ignore-scripts
      - name: Commit generated lockfile
        run: |
          if git diff --quiet -- package-lock.json; then
            echo "Lockfile is already current."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package-lock.json
          git commit -m "Update lockfile for Vercel Speed Insights"
          git push origin HEAD:perf/vercel-speed-insights
